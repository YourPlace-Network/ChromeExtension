<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-header">
    <img src="../../yourplace-logo.svg" alt="YourPlace" class="popup-logo">
    <span class="popup-title">YourPlace</span>
  </div>
  <button id="openYourPlace" class="open-button">Open YourPlace</button>
  <div class="popup-setting">
    <label class="toggle-label" for="autoPostToggle">
      <span>Auto-post to YourPlace</span>
      <div class="toggle-switch">
        <input type="checkbox" id="autoPostToggle">
        <span class="toggle-slider"></span>
      </div>
    </label>
    <p class="setting-description">When enabled, your tweets are automatically submitted as YourPlace posts.</p>
  </div>
  <script src="popup.js"></script>
</body>
</html>
